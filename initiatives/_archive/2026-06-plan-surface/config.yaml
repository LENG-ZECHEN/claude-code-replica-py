      Testing (≥ 14 cases):
        - tests/test_permission_mode.py
          - PermissionMode enum values + str representation (1)
          - PlanModeAttachment frozen / immutable / hash-stable (1)
          - ENTER_PLAN_MODE_TEACHING_TEXT contains "DO NOT write or edit
